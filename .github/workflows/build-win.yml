name: Build Windows x64

on:
  workflow_dispatch:          # 手动触发
  push:
    tags:
      - 'v*'                  # 推送 v1.0, v2.0 等 tag 时自动触发

permissions:
  contents: write             # electron-builder 需要此权限创建/上传 GitHub Release

jobs:
  build:
    runs-on: windows-latest   # GitHub 托管的 Windows 运行器

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 构建 Windows x64 版本
        run: npx electron-builder build --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传构建产物
        uses: actions/upload-artifact@v5
        with:
          name: ModbusMate-Win64
          path: release/*.exe
